<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/src/assets/brand/justhireme-mark.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="JustHireMe — Local-first autonomous job-seeking engine" />
    <title>JustHireMe</title>
    <!-- Brand type stack: Instrument Serif (display) + Instrument Sans + Geist Mono.
         Self-hosted from /public/fonts via @font-face in src/index.css — a
         local-first app must render its identity with zero network. -->
  </head>
  <body>
    <div id="root"></div>
    <script>
      /* Apply the saved theme before first paint to avoid a flash of the wrong
         theme. Mirrors src/shared/lib/theme.ts (kept tiny + dependency-free). */
      (function () {
        try {
          var pref = localStorage.getItem("jhm-theme") || "system";
          var dark = pref === "dark" || (pref === "system"
            && window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches);
          var theme = dark ? "dark" : "light";
          document.documentElement.dataset.theme = theme;
          document.documentElement.style.colorScheme = theme;
        } catch (e) { /* no-op: defaults to light via CSS */ }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
