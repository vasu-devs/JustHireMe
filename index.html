<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/src/assets/brand/justhireme-mark.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="JustHireMe — Local-first autonomous job-seeking engine" />
    <title>JustHireMe</title>
    <!-- Premium type stack: Fraunces (display serif) + Instrument Serif (italic accent) + Inter (sans) + JetBrains Mono -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT,WONK@0,9..144,300..900,0..100,0..1;1,9..144,300..900,0..100,0..1&family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script>
      /* Apply the saved theme before first paint to avoid a flash of the wrong
         theme. Mirrors src/shared/lib/theme.ts (kept tiny + dependency-free). */
      (function () {
        try {
          var pref = localStorage.getItem("jhm-theme") || "system";
          var dark = pref === "dark" || (pref === "system"
            && window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches);
          var theme = dark ? "dark" : "light";
          document.documentElement.dataset.theme = theme;
          document.documentElement.style.colorScheme = theme;
        } catch (e) { /* no-op: defaults to light via CSS */ }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
