name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.13"
  NODE_VERSION: "24"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release-preflight:
    name: Release preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Verify tag matches project versions
        run: npm run version:check -- "${{ github.ref_name }}"

  build-backend:
    name: Build backend sidecar (${{ matrix.name }})
    needs: release-preflight
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.experimental }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            platform: windows
            os: windows-latest
            experimental: false
          - name: Linux
            platform: linux
            os: ubuntu-latest
            experimental: false
          - name: macOS
            platform: macos
            os: macos-latest
            experimental: false
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: astral-sh/setup-uv@v8.1.0

      - uses: dtolnay/rust-toolchain@stable

      - name: Install backend dependencies
        run: cd backend && uv sync --dev

      - name: Audit backend dependencies
        run: cd backend && uv run --with pip-audit pip-audit

      - name: Install Playwright Chromium runtime (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $env:PLAYWRIGHT_BROWSERS_PATH = "..\src-tauri\resources\bin\ms-playwright"
          cd backend
          uv run python -m playwright install chromium

      - name: Install Playwright Chromium runtime (Unix)
        if: matrix.platform != 'windows'
        shell: bash
        run: |
          set -euo pipefail
          export PLAYWRIGHT_BROWSERS_PATH="../src-tauri/resources/bin/ms-playwright"
          cd backend
          uv run python -m playwright install chromium

      - name: Build sidecar with canonical script
        run: npm run build:sidecar

      - name: List sidecar output (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          Write-Host "Sidecar directory:"
          Get-ChildItem -Path src-tauri\resources\backend\ -Recurse |
            Select-Object FullName, Length |
            Format-Table -AutoSize
          $backendTotal = (Get-ChildItem -Path src-tauri\resources\backend\ -Recurse -File |
            Measure-Object -Property Length -Sum).Sum / 1MB
          $runtimeTotal = (Get-ChildItem -Path src-tauri\resources\sidecar-internal\ -Recurse -File |
            Measure-Object -Property Length -Sum).Sum / 1MB
          Write-Host "Sidecar backend size: $([math]::Round($backendTotal, 1)) MB"
          Write-Host "Sidecar runtime size: $([math]::Round($runtimeTotal, 1)) MB"
          Get-Content src-tauri\resources\backend\sidecar-manifest.json

      - name: List sidecar output (Unix)
        if: matrix.platform != 'windows'
        shell: bash
        run: |
          set -euo pipefail
          find src-tauri/resources/backend -maxdepth 3 -type f -print
          backend_kb="$(du -sk src-tauri/resources/backend | awk '{print $1}')"
          runtime_kb="$(du -sk src-tauri/resources/sidecar-internal | awk '{print $1}')"
          echo "Sidecar backend size: $((backend_kb / 1024)) MB"
          echo "Sidecar runtime size: $((runtime_kb / 1024)) MB"
          cat src-tauri/resources/backend/sidecar-manifest.json

      - name: Upload backend sidecar artifact
        uses: actions/upload-artifact@v7
        with:
          name: backend-sidecar-${{ matrix.platform }}
          path: |
            src-tauri/resources/backend/
            src-tauri/resources/sidecar-internal/
          retention-days: 1

      - name: Package browser runtime OTA asset (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -ItemType Directory -Path release-assets -Force | Out-Null
          Compress-Archive -Path src-tauri\resources\bin\ms-playwright -DestinationPath release-assets\JustHireMe-browser-runtime-windows.zip -Force

      - name: Package browser runtime OTA asset (Unix)
        if: matrix.platform != 'windows'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          cd src-tauri/resources/bin
          zip -qr "../../../release-assets/JustHireMe-browser-runtime-${{ matrix.platform }}.zip" ms-playwright

      - name: Upload browser runtime OTA asset
        uses: actions/upload-artifact@v7
        with:
          name: release-assets-browser-runtime-${{ matrix.platform }}
          path: release-assets/
          retention-days: 1

  build-tauri:
    name: Build Tauri installer (${{ matrix.name }})
    needs: build-backend
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.experimental }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            platform: windows
            os: windows-latest
            package_script: package:windows
            experimental: false
          - name: Linux
            platform: linux
            os: ubuntu-latest
            package_script: package:linux
            experimental: false
          - name: macOS
            platform: macos
            os: macos-latest
            package_script: package:macos
            experimental: false
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Audit frontend dependencies
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $auditLines = npm audit --audit-level=moderate --json 2>&1
          $auditExit = $LASTEXITCODE
          $auditText = ($auditLines -join "`n").Trim()

          if (-not $auditText) {
            if ($auditExit -ne 0) {
              Write-Warning "npm audit exited with $auditExit but returned no report. npm ci already completed successfully, so continuing."
            }
            exit 0
          }

          try {
            $audit = $auditText | ConvertFrom-Json
          } catch {
            Write-Host $auditText
            throw
          }

          $vulnerabilities = $audit.metadata.vulnerabilities
          function Get-VulnerabilityCount($name) {
            if ($null -ne $vulnerabilities -and $null -ne $vulnerabilities.PSObject.Properties[$name]) {
              return [int]$vulnerabilities.$name
            }
            return 0
          }

          $moderate = Get-VulnerabilityCount "moderate"
          $high = Get-VulnerabilityCount "high"
          $critical = Get-VulnerabilityCount "critical"
          $blocking = $moderate + $high + $critical

          if ($blocking -gt 0) {
            Write-Host $auditText
            throw "npm audit found $blocking moderate/high/critical frontend vulnerabilities."
          }

          if ($auditExit -ne 0) {
            Write-Warning "npm audit exited with $auditExit but reported no moderate/high/critical vulnerabilities. Continuing."
          }

      - name: Install Tauri Linux system dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            libglib2.0-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            pkg-config \
            patchelf \
            wget

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Verify project versions
        run: npm run version:check -- "${{ github.ref_name }}"

      - name: Build frontend
        run: npm run build

      - name: Download backend sidecar
        uses: actions/download-artifact@v8
        with:
          name: backend-sidecar-${{ matrix.platform }}
          path: src-tauri/resources/

      - name: Verify sidecar exists (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $triple = (rustc -vV | Select-String "host:").ToString().Split()[1].Trim()
          $sidecar = "src-tauri\resources\backend\jhm-sidecar-next-$triple.exe"
          $runtime = "src-tauri\resources\sidecar-internal\python313.dll"
          if (-not (Test-Path $sidecar)) {
            throw "Sidecar not found at $sidecar"
          }
          if (-not (Test-Path $runtime)) {
            throw "Sidecar runtime not found at $runtime"
          }
          if (-not (Test-Path "src-tauri\resources\backend\sidecar-manifest.json")) {
            throw "Sidecar manifest not found."
          }
          Write-Host "Sidecar verified: $sidecar ($(( Get-Item $sidecar ).Length / 1MB) MB)"
          Write-Host "Browser runtime is shipped as an OTA asset, not bundled into the installer."

      - name: Verify sidecar exists (Unix)
        if: matrix.platform != 'windows'
        shell: bash
        run: |
          set -euo pipefail
          triple="$(rustc -vV | awk '/host:/ {print $2}')"
          sidecar="src-tauri/resources/backend/jhm-sidecar-next-${triple}"
          runtime="src-tauri/resources/sidecar-internal/base_library.zip"
          if [ ! -f "$sidecar" ]; then
            echo "Sidecar not found at $sidecar" >&2
            exit 1
          fi
          if [ ! -f "$runtime" ]; then
            echo "Sidecar runtime not found at $runtime" >&2
            exit 1
          fi
          if [ ! -f "src-tauri/resources/backend/sidecar-manifest.json" ]; then
            echo "Sidecar manifest not found." >&2
            exit 1
          fi
          chmod +x "$sidecar"
          echo "Sidecar verified: $sidecar ($(du -h "$sidecar" | awk '{print $1}'))"
          echo "Browser runtime is shipped as an OTA asset, not bundled into the installer."

      - name: Prepare macOS sidecar permissions
        if: matrix.platform == 'macos'
        shell: bash
        run: |
          set -euo pipefail
          triple="$(rustc -vV | awk '/host:/ {print $2}')"
          sidecar="src-tauri/resources/backend/jhm-sidecar-next-${triple}"
          chmod +x "$sidecar"
          xattr -cr src-tauri/resources/backend src-tauri/resources/sidecar-internal || true
          codesign --force --sign - "$sidecar"

      - name: Verify updater signing secrets
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${TAURI_SIGNING_PRIVATE_KEY:-}" ] || [ -z "${TAURI_SIGNING_PRIVATE_KEY_PASSWORD:-}" ]; then
            echo "Missing Tauri updater signing secrets. Set TAURI_SIGNING_PRIVATE_KEY and TAURI_SIGNING_PRIVATE_KEY_PASSWORD before tagging a release." >&2
            exit 1
          fi

      - name: Build Tauri installer
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run ${{ matrix.package_script }}

      - name: Collect release assets (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $releaseDir = "release-assets"
          New-Item -ItemType Directory -Path $releaseDir -Force | Out-Null
          $assets = Get-ChildItem -Path "src-tauri\target\release\bundle" -Recurse -File -Include "*.exe", "*.msi", "*.sig" |
            Sort-Object Name
          $installers = $assets | Where-Object { $_.Extension -in ".exe", ".msi" }
          if (-not $installers) {
            throw "No Windows installer artifacts were produced."
          }

          $lines = foreach ($asset in $assets) {
            Copy-Item $asset.FullName -Destination $releaseDir -Force
            $hash = (Get-FileHash -Algorithm SHA256 -Path $asset.FullName).Hash.ToLowerInvariant()
            "$hash  $($asset.Name)"
          }
          $lines | Set-Content -Path "$releaseDir\SHA256SUMS-windows.txt" -Encoding utf8

      - name: Collect release assets (Unix)
        if: matrix.platform != 'windows'
        shell: bash
        run: |
          set -euo pipefail
          release_dir="release-assets"
          mkdir -p "$release_dir"
          asset_list="$release_dir/assets.txt"

          if [ "${{ matrix.platform }}" = "linux" ]; then
            find src-tauri/target/release/bundle -type f \( -name "*.deb" -o -name "*.AppImage" -o -name "*.sig" \) | sort > "$asset_list"
          else
            find src-tauri/target/release/bundle -type f \( -name "*.dmg" -o -name "*.tar.gz" -o -name "*.sig" \) | sort > "$asset_list"
          fi

          if [ ! -s "$asset_list" ]; then
            echo "No ${{ matrix.name }} installer artifacts were produced." >&2
            exit 1
          fi

          checksum_file="$release_dir/SHA256SUMS-${{ matrix.platform }}.txt"
          : > "$checksum_file"
          while IFS= read -r asset; do
            cp "$asset" "$release_dir/"
            shasum -a 256 "$asset" | awk -v name="$(basename "$asset")" '{print $1 "  " name}' >> "$checksum_file"
          done < "$asset_list"
          rm "$asset_list"

      - name: Upload release assets
        uses: actions/upload-artifact@v7
        with:
          name: release-assets-${{ matrix.platform }}
          path: release-assets/
          retention-days: 1

  publish-release:
    name: Publish GitHub release
    needs: build-tauri
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Download release assets
        uses: actions/download-artifact@v8
        with:
          pattern: release-assets-*
          path: release-assets
          merge-multiple: true

      - name: Generate release checksums and notes
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"
          cd release-assets

          find . -type f ! -name "SHA256SUMS*.txt" ! -name "ASSET-SIZES.txt" -printf "%P\n" | sort | while read -r asset; do
            sha256sum "$asset"
          done > SHA256SUMS.txt
          find . -type f ! -name "SHA256SUMS*.txt" ! -name "ASSET-SIZES.txt" -printf "%P\n" | sort | while read -r asset; do
            bytes="$(stat -c%s "$asset")"
            python - "$bytes" "$asset" <<'PY'
          import sys
          size = int(sys.argv[1])
          asset = sys.argv[2]
          print(f"{size / (1024 * 1024):8.1f} MB  {asset}")
          PY
          done > ASSET-SIZES.txt

          release_url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${tag}"
          windows_asset="$(find . -maxdepth 1 -type f -name "*.exe" -printf "%f\n" | sort | head -n1)"
          windows_sig="$(find . -maxdepth 1 -type f -name "*.exe.sig" -printf "%f\n" | sort | head -n1)"
          linux_asset="$(find . -maxdepth 1 -type f -name "*.AppImage" -printf "%f\n" | sort | head -n1)"
          linux_sig="$(find . -maxdepth 1 -type f -name "*.AppImage.sig" -printf "%f\n" | sort | head -n1)"
          mac_asset="$(find . -maxdepth 1 -type f -name "*.app.tar.gz" -printf "%f\n" | sort | head -n1)"
          mac_sig="$(find . -maxdepth 1 -type f -name "*.app.tar.gz.sig" -printf "%f\n" | sort | head -n1)"
          pub_date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          export TAG="$tag" VERSION="$version" RELEASE_URL="$release_url" PUB_DATE="$pub_date"
          export WINDOWS_ASSET="$windows_asset" WINDOWS_SIG="$windows_sig"
          export LINUX_ASSET="$linux_asset" LINUX_SIG="$linux_sig"
          export MAC_ASSET="$mac_asset" MAC_SIG="$mac_sig"

          python - <<'PY'
          import json
          import os
          import pathlib

          tag = os.environ["TAG"]
          version = os.environ["VERSION"]
          release_url = os.environ["RELEASE_URL"]
          platforms = {}
          candidates = {
              "windows-x86_64": (os.environ.get("WINDOWS_ASSET"), os.environ.get("WINDOWS_SIG")),
              "linux-x86_64": (os.environ.get("LINUX_ASSET"), os.environ.get("LINUX_SIG")),
              "darwin-aarch64": (os.environ.get("MAC_ASSET"), os.environ.get("MAC_SIG")),
          }
          for target, (asset, sig) in candidates.items():
              if not asset or not sig:
                  continue
              sig_path = pathlib.Path(sig)
              platforms[target] = {
                  "signature": sig_path.read_text(encoding="utf-8").strip(),
                  "url": f"{release_url}/{asset}",
              }
          if not platforms:
              raise SystemExit("No updater platforms found. Missing signed updater artifacts.")
          pathlib.Path("latest.json").write_text(json.dumps({
              "version": version,
              "notes": f"JustHireMe {tag}: signed desktop update.",
              "pub_date": os.environ["PUB_DATE"],
              "platforms": platforms,
          }, indent=2), encoding="utf-8")
          PY

          cd ..
          {
            echo "## JustHireMe ${tag}"
            echo
            echo "### Installation"
            if find release-assets -maxdepth 1 -type f -name "*.exe" | grep -q .; then
              echo "- Windows: download JustHireMe_${version}_x64-setup.exe, run it, and use More info -> Run anyway if SmartScreen appears."
            fi
            if find release-assets -maxdepth 1 -type f \( -name "*.AppImage" -o -name "*.deb" \) | grep -q .; then
              echo "- Linux: download the .AppImage, run chmod a+x on it, then launch it; or install the .deb on Debian/Ubuntu-based systems."
            fi
            if find release-assets -maxdepth 1 -type f -name "*.dmg" | grep -q .; then
              echo "- macOS: download the .dmg and drag JustHireMe into Applications. This alpha build uses ad-hoc signing, so macOS may require Privacy & Security -> Open Anyway."
            fi
            echo
            echo "> **Your data stays on your machine.** JustHireMe is local-first: no hosted backend, no tracking, and no app data leaves your computer by default."
            echo
            echo "### SHA256 checksums"
            echo
            sed 's/^/    /' release-assets/SHA256SUMS.txt
            echo
            echo "### Asset sizes"
            echo
            sed 's/^/    /' release-assets/ASSET-SIZES.txt
            echo
            echo "### What's inside"
            echo "- Local-first job intelligence workbench"
            echo "- Source adapters, quality gates, and transparent ranking"
            echo "- Built-in CRM for your job pipeline"
            echo "- Profile-aware graph and vector matching"
            echo "- Resume, cover letter, and outreach draft generation"
            echo "- Bundled backend sidecar"
            echo "- Optional Playwright Chromium runtime as an on-demand OTA download"
            echo "- Signed in-app updates for future releases"
            echo
            echo "---"
            echo "_This installer set was built by GitHub Actions from tag ${tag}. Having issues? [Open an issue](https://github.com/${GITHUB_REPOSITORY}/issues) or check the [README](https://github.com/${GITHUB_REPOSITORY}#readme)._"
          } > release-notes.md

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          cd release-assets
          mapfile -t assets < <(find . -maxdepth 1 -type f -printf "%P\n" | sort)
          if [ "${#assets[@]}" -eq 0 ]; then
            echo "No release assets found." >&2
            exit 1
          fi

          gh release create "${GITHUB_REF_NAME}" "${assets[@]}" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "JustHireMe ${GITHUB_REF_NAME}" \
            --notes-file "../release-notes.md" \
            --latest
