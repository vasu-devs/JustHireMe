name: CI

on:
  push:
    branches:
      - main
      - codex-local-microservices
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm

      - name: Audit frontend dependencies
        run: npm audit --audit-level=moderate

      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - uses: astral-sh/setup-uv@v8.1.0

      - name: Audit backend dependencies
        run: cd backend && uv sync --dev && uv run --with pip-audit pip-audit

      - uses: dtolnay/rust-toolchain@stable

      - name: Audit Rust dependencies
        run: |
          cargo install cargo-audit --locked
          cd src-tauri
          cargo audit

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  website:
    name: Website
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    defaults:
      run:
        working-directory: website
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: website/package-lock.json
      - run: npm ci
      - run: npm run build

  backend:
    name: Backend
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - uses: astral-sh/setup-uv@v8.1.0
      - run: cd backend && uv sync --dev
      - run: cd backend && uv run python -m pytest tests/test_import_boundaries.py -q
      - run: cd backend && uv run python -m pytest tests -q

  backend-domains:
    name: Backend domain tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        domain:
          - core
          - data
          - profile
          - discovery
          - ranking
          - generation
          - api
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - uses: astral-sh/setup-uv@v8.1.0
      - run: cd backend && uv sync --dev
      - name: Run focused domain tests
        run: |
          cd backend
          files=$(ls tests/test_${{ matrix.domain }}*.py 2>/dev/null || true)
          if [ -n "$files" ]; then
            uv run python -m pytest tests/test_import_boundaries.py $files -q
          else
            uv run python -m pytest tests/test_import_boundaries.py -q
          fi

  rust:
    name: Rust check
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v6
      - name: Install Tauri Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            libglib2.0-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            pkg-config \
            patchelf \
            wget
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"
      - run: |
          triple=$(rustc -vV | grep 'host:' | awk '{print $2}')
          mkdir -p src-tauri/resources/backend
          touch "src-tauri/resources/backend/jhm-sidecar-next-${triple}"
          mkdir -p src-tauri/resources/sidecar-internal
          touch src-tauri/resources/sidecar-internal/.ci-placeholder
          chmod +x "src-tauri/resources/backend/jhm-sidecar-next-${triple}"
      - run: cd src-tauri && cargo check
